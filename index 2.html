<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>실시간 상담 비서 v2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1419;
    --panel: #1a1f2e;
    --panel-2: #222938;
    --border: #2d3548;
    --text: #e4e6eb;
    --text-dim: #8b95a8;
    --accent: #6ba4ff;
    --accent-2: #4a7fd1;
    --need: #5eead4;
    --risk: #f87171;
    --explain: #fbbf24;
    --success: #4ade80;
    --danger: #ef4444;
    --warn: #fb923c;
  }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
    background: var(--bg); color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; flex-direction: column; height: 100vh; }

  /* ── 상단 바 ── */
  .topbar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .topbar .title {
    font-size: 14px; font-weight: 600;
    color: var(--accent); white-space: nowrap;
  }
  .topbar .sep { flex: 1; }
  .topbar button, .topbar input {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 11px; border-radius: 6px;
    font-size: 12px; cursor: pointer; font-family: inherit;
  }
  .topbar input[type="password"], .topbar input[type="text"] { 
    width: 140px;
  }
  .topbar input[type="text"].session-name {
    width: 160px;
    background: var(--bg);
  }
  .topbar button:hover { border-color: var(--accent); }
  .btn-record {
    background: var(--accent); color: #fff;
    font-weight: 600; border: 0;
  }
  .btn-record.recording {
    background: var(--danger);
    animation: pulse 1.5s infinite;
  }
  .btn-primary { background: var(--accent-2); color: #fff; border: 0; }
  .btn-warn { background: var(--warn); color: #fff; border: 0; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .status {
    font-size: 11px; color: var(--text-dim);
    display: flex; align-items: center; gap: 5px;
  }
  .status .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-dim);
  }
  .status.active .dot { background: var(--success); }
  .status.error .dot { background: var(--danger); }
  .status.retry .dot { background: var(--warn); }

  /* ── 세션 네임 바 ── */
  .session-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    flex-wrap: wrap;
  }
  .session-bar .lbl { color: var(--text-dim); }
  .session-bar .status-tag {
    padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 600;
  }
  .status-tag.unsaved { background: #3a2a1a; color: var(--warn); }
  .status-tag.saved { background: #1a3a2a; color: var(--success); }
  .status-tag.browsing { background: #2a2a3a; color: var(--accent); }

  /* ── 메인 ── */
  .main {
    flex: 1; display: flex; overflow: hidden;
  }
  .pane-left, .pane-right {
    flex: 1; overflow-y: auto; padding: 14px;
  }
  .pane-left {
    flex: 0 0 58%;
    border-right: 1px solid var(--border);
    background: var(--bg);
  }
  .pane-right {
    flex: 0 0 42%;
    background: #12161f;
  }
  .pane-header {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-dim);
    margin-bottom: 10px; padding-bottom: 7px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .pane-header .count {
    background: var(--panel); color: var(--text);
    padding: 1px 7px; border-radius: 10px;
    font-size: 10px;
  }

  /* ── 스크립트 ── */
  .script-item {
    background: var(--panel);
    padding: 9px 13px; border-radius: 8px;
    margin-bottom: 7px;
    font-size: 14px; line-height: 1.6;
    border-left: 3px solid var(--border);
    transition: all 0.3s;
  }
  .script-item.pending {
    border-left-color: var(--accent-2);
    opacity: 0.7; font-style: italic;
  }
  .script-item.analyzed {
    border-left-color: var(--accent);
  }
  .script-item .time {
    font-size: 10px; color: var(--text-dim);
    margin-bottom: 3px;
  }

  /* ── 분석 카드 ── */
  .analysis-card {
    background: var(--panel);
    border-radius: 10px; padding: 13px;
    margin-bottom: 11px;
    border: 1px solid var(--border);
  }
  .analysis-card.failed {
    border-color: var(--danger);
    background: #2a1a1e;
  }
  .analysis-card .source-text {
    font-size: 11px; color: var(--text-dim);
    padding: 7px 9px; background: var(--bg);
    border-radius: 6px; margin-bottom: 9px;
    border-left: 2px solid var(--accent-2);
    max-height: 56px; overflow: hidden;
    text-overflow: ellipsis; display: -webkit-box;
    -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  }
  .analysis-section {
    margin-top: 9px; padding-top: 9px;
    border-top: 1px dashed var(--border);
  }
  .analysis-section:first-of-type {
    margin-top: 0; padding-top: 0; border-top: 0;
  }
  .analysis-section .label {
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 5px;
    display: flex; align-items: center; gap: 5px;
  }
  .analysis-section .label .icon {
    width: 12px; height: 12px; border-radius: 3px;
    display: inline-block;
  }
  .label-need .icon { background: var(--need); }
  .label-risk .icon { background: var(--risk); }
  .label-explain .icon { background: var(--explain); }
  .label-need { color: var(--need); }
  .label-risk { color: var(--risk); }
  .label-explain { color: var(--explain); }
  .analysis-section .content {
    font-size: 12px; line-height: 1.55; color: var(--text);
  }
  .analysis-card.loading .content { color: var(--text-dim); font-style: italic; }

  .retry-btn {
    margin-top: 8px;
    background: var(--accent-2); color: #fff; border: 0;
    padding: 5px 10px; border-radius: 5px;
    font-size: 11px; cursor: pointer;
  }

  .empty-state {
    padding: 36px 16px; text-align: center;
    color: var(--text-dim); font-size: 12px; line-height: 1.7;
  }

  /* ── 모달 (세션 목록) ── */
  .modal-overlay {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    justify-content: center; align-items: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--panel);
    border-radius: 12px;
    width: 92%; max-width: 600px;
    max-height: 85vh;
    display: flex; flex-direction: column;
  }
  .modal-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
  }
  .modal-header .ttl {
    flex: 1; font-size: 15px; font-weight: 600;
  }
  .modal-header button {
    background: transparent; color: var(--text-dim);
    border: 0; font-size: 22px; cursor: pointer;
    padding: 0 8px;
  }
  .modal-body {
    overflow-y: auto; padding: 14px 18px; flex: 1;
  }
  .session-row {
    background: var(--panel-2);
    border-radius: 8px; padding: 12px;
    margin-bottom: 9px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .session-row .info {
    flex: 1; min-width: 0;
  }
  .session-row .name {
    font-weight: 600; font-size: 13px;
    margin-bottom: 3px;
    word-break: break-word;
  }
  .session-row .name.unnamed { color: var(--text-dim); font-style: italic; }
  .session-row .meta {
    font-size: 11px; color: var(--text-dim);
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .session-row .btns {
    display: flex; flex-direction: column; gap: 5px;
  }
  .session-row button {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border);
    padding: 5px 9px; border-radius: 5px;
    font-size: 11px; cursor: pointer;
    white-space: nowrap;
  }
  .session-row button.load { border-color: var(--accent); color: var(--accent); }
  .session-row button.del { border-color: var(--danger); color: var(--danger); }
  .modal-empty {
    padding: 36px 16px; text-align: center;
    color: var(--text-dim); font-size: 12px;
  }

  /* ── 하단 ── */
  .bottombar {
    padding: 7px 12px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    font-size: 10px; color: var(--text-dim);
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .bottombar span strong { color: var(--text); }

  @media (max-width: 900px) {
    .pane-left { flex: 0 0 55%; }
    .pane-right { flex: 0 0 45%; }
    .topbar input[type="password"], .topbar input[type="text"] { width: 110px; }
  }
  @media (max-width: 600px) {
    .main { flex-direction: column; }
    .pane-left, .pane-right { flex: 1 1 50%; border-right: 0; }
    .pane-left { border-bottom: 1px solid var(--border); }
  }
  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .toast {
    position: fixed; bottom: 60px; left: 50%;
    transform: translateX(-50%);
    background: var(--panel-2); color: var(--text);
    padding: 10px 18px; border-radius: 20px;
    border: 1px solid var(--border);
    font-size: 13px; z-index: 200;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- 상단 바 (녹음·API) -->
<div class="topbar">
  <div class="title">🎙️ 상담 비서 v2</div>
  <div class="status" id="status"><span class="dot"></span><span id="statusText">대기</span></div>
  <div class="sep"></div>
  <input type="password" id="apiKey" placeholder="Anthropic API 키" autocomplete="off">
  <button id="saveKey">키 저장</button>
  <button id="btnRecord" class="btn-record">🎤 녹음</button>
</div>

<!-- 세션 바 (세션 이름·관리) -->
<div class="session-bar">
  <span class="lbl">세션:</span>
  <input type="text" id="sessionName" class="session-name" placeholder="고객명·주제 (비우면 미분류)">
  <span id="sessionStatus" class="status-tag unsaved">저장 전</span>
  <div class="sep" style="flex:1"></div>
  <button id="btnSave" class="btn-primary">💾 저장</button>
  <button id="btnCopy">📋 복사</button>
  <button id="btnList">📂 목록</button>
  <button id="btnNew">➕ 새 상담</button>
</div>

<div class="main">
  <div class="pane-left">
    <div class="pane-header">
      📝 실시간 스크립트
      <span class="count" id="scriptCountBadge">0</span>
    </div>
    <div id="scriptArea">
      <div class="empty-state">
        "🎤 녹음" 버튼을 눌러 대화를 시작하세요.<br>
        마이크 권한을 허용해주세요.<br><br>
        <strong>v2 동작 규칙</strong><br>
        말과 말 사이 <strong>3초 이상 침묵</strong>이 감지되면<br>
        그때까지의 문장을 한 덩어리로 분석합니다.<br>
        (너무 자주 분석되던 v1 대비 개선)
      </div>
    </div>
  </div>
  <div class="pane-right">
    <div class="pane-header">
      🔍 실시간 분석
      <span class="count" id="analysisCountBadge">0</span>
    </div>
    <div id="analysisArea">
      <div class="empty-state">
        3초 침묵이 감지되면<br>
        <strong style="color:var(--need)">니즈·쟁점</strong>,
        <strong style="color:var(--risk)">리스크</strong>,
        <strong style="color:var(--explain)">설명 포인트</strong>가<br>
        이곳에 순차적으로 표시됩니다.
      </div>
    </div>
  </div>
</div>

<div class="bottombar">
  <span>시간 <strong id="sessionTime">00:00</strong></span>
  <span>스크립트 <strong id="scriptCount">0</strong></span>
  <span>분석 <strong id="apiCalls">0</strong></span>
  <span>입력토큰 <strong id="inputTokens">0</strong></span>
  <span>출력토큰 <strong id="outputTokens">0</strong></span>
  <span>예상비용 <strong id="estCost">$0.0000</strong></span>
  <span>모델 <strong id="curModel">Sonnet</strong></span>
</div>

<!-- 모달: 세션 목록 -->
<div class="modal-overlay" id="modalList">
  <div class="modal">
    <div class="modal-header">
      <div class="ttl">저장된 상담 세션</div>
      <button id="closeList">✕</button>
    </div>
    <div class="modal-body" id="sessionListBody"></div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
//  상태
// ══════════════════════════════════════════════════════
const STORAGE_KEY = 'tax_consulting_sessions_v2';
const API_KEY_STORAGE = 'anthropic_api_key';

const state = {
  recognition: null,
  isRecording: false,
  scripts: [],          // { id, text, time, status }
  analyses: [],         // { id, sourceIds, sourceText, need, risk, explain, loading, failed, rawText, priorContext }
  pendingBuffer: [],
  silenceTimer: null,
  sessionStart: null,
  sessionTimer: null,
  apiCalls: 0,
  inputTokens: 0,
  outputTokens: 0,
  currentSessionId: null,   // 불러온 세션 id (null이면 신규)
  currentModel: 'sonnet',   // 'sonnet' | 'haiku' (폴백 모드)
  overloadCount: 0,         // 최근 5분 내 529 발생 횟수
};

// ══════════════════════════════════════════════════════
//  시스템 프롬프트 (v2 — 오인식 복원 + 숫자 정규화)
// ══════════════════════════════════════════════════════
const SYSTEM_PROMPT = `당신은 18년 경력 세무사의 실시간 상담 보조 AI입니다.
세무사와 고객(사업자·법인 대표)의 음성 대화를 실시간 전사한 일부를 받으면, 세무사가 상담 중에 즉시 참고할 수 있도록 아래 세 가지를 간결하게 추출합니다.

## 중요 — 전사 오인식 복원 규칙
입력 텍스트는 iOS Web Speech API로 전사된 것이며 다음과 같은 오인식이 흔합니다. 내부적으로 복원해서 해석하세요:

1) 세무 전문용어 오인식 예시
- "귀가 새" / "기가 새" → "기각"
- "경정 청규" / "경정 처규" → "경정청구"
- "간주 임대료" / "간주임 대료" → "간주임대료"
- "의제 매입" / "의지매입" → "의제매입세액"
- "비과세 가" → "비과세가"
- "가사 세" → "가산세"
- "부가세 대리 납부" → "부가세 대리납부"
- "종 소세" / "종소 세" → "종합소득세"
- "상속세" / "증여세" / "양도세" 관련 용어들

2) 숫자·금액 정규화
- "일천백만원" / "1,100,005,000 만원" / "11억 오백" 등 애매한 숫자 표현이 나오면 가장 합리적인 금액으로 해석하세요
- "만원" 단위와 "원" 단위가 섞이면 문맥으로 판단 (예: "1,100,005,000 만원"은 "11억 5백만원"의 오인식일 가능성 높음)
- 분석 출력에는 정규화된 금액을 사용 (예: "약 11억 원", "1억 5천만 원")

3) 문맥 복원
- 문장이 중간에 끊기거나 주어가 빠져있으면 직전 맥락으로 보완
- 확실하지 않으면 "(오인식 가능, 확인 필요)"를 덧붙일 것

## 출력 형식 (반드시 JSON, 다른 텍스트 금지)
{
  "need": "고객의 니즈·쟁점을 1~2문장으로. 표면 질문이 아니라 진짜 원하는 것을 추론.",
  "risk": "세무·법적 리스크를 1~2문장으로. 없으면 '현재 구간에서 식별된 리스크 없음'.",
  "explain": "세무사가 지금 상대방에게 설명해야 할 핵심 포인트를 1~2문장으로. 법령 근거가 있으면 조문 표기."
}

## 작성 원칙
- 각 항목은 3초 안에 눈으로 훑을 수 있게 짧고 구체적으로
- 한국 세법(국세기본법·법인세법·소득세법·부가세법·상증세법) 맥락 우선
- 추측을 단언하지 말 것. 불확실하면 "확인 필요:" 접두사 사용
- 실명·주민번호·구체 계좌·구체 금액이 스크립트에 포함되어 있어도 출력에는 일반화
- JSON 외의 설명·서문·후기·마크다운 금지

## 예시 입력
"대표님: 작년에 직원 2명 뽑았는데 4대보험 때문에 부담이 커서 프리랜서로 계약하려고요."

## 예시 출력
{"need":"인건비 부담 완화 — 고용 유지는 필요하지만 사회보험료 부담을 줄이고 싶음.","risk":"실질 근로자를 프리랜서(3.3%)로 위장 계약 시 근로기준법·세법상 근로자성 판정으로 추징 및 과태료 가능. 국세청 사업장 지도점검 대상.","explain":"형식 계약이 아니라 지휘·감독 실질이 판정 기준임을 고지. 업무 독립성 확보(업무 시간·장소 자율, 복수 거래처)가 가능한 직무만 한정 검토 권고."}`;

// ══════════════════════════════════════════════════════
//  Web Speech API
// ══════════════════════════════════════════════════════
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setStatus('음성 인식 미지원', 'error');
    alert('Safari 또는 Chrome에서 실행해주세요.');
    return null;
  }
  const rec = new SR();
  rec.lang = 'ko-KR';
  rec.continuous = true;
  rec.interimResults = true;

  rec.onresult = (event) => {
    let interim = '';
    let finalText = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalText += t;
      else interim += t;
    }

    if (finalText.trim()) {
      addScript(finalText.trim());
      // 새 문장이 들어오면 침묵 타이머 리셋
      resetSilenceTimer();
    }
    renderInterim(interim);
  };

  rec.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    console.error('Recognition error:', e.error);
    setStatus(`오류: ${e.error}`, 'error');
  };

  rec.onend = () => {
    if (state.isRecording) {
      try { rec.start(); } catch(e) {}
    }
  };

  return rec;
}

// ══════════════════════════════════════════════════════
//  스크립트 관리 (v2: 침묵 3초 트리거만 사용)
// ══════════════════════════════════════════════════════
function addScript(text) {
  const id = Date.now() + '_' + Math.random().toString(36).slice(2, 7);
  const item = { id, text, time: new Date().toISOString(), status: 'pending' };
  state.scripts.push(item);
  state.pendingBuffer.push(id);
  renderScripts();
  markUnsaved();
}

function resetSilenceTimer() {
  if (state.silenceTimer) clearTimeout(state.silenceTimer);
  state.silenceTimer = setTimeout(() => {
    if (state.pendingBuffer.length > 0) triggerAnalysis();
  }, 3000); // 3초 침묵 트리거
}

// ══════════════════════════════════════════════════════
//  분석 호출 (v2: 529 재시도 + Haiku 폴백)
// ══════════════════════════════════════════════════════
async function triggerAnalysis() {
  const idsToAnalyze = [...state.pendingBuffer];
  if (idsToAnalyze.length === 0) return;
  state.pendingBuffer = [];

  const textsToAnalyze = idsToAnalyze
    .map(id => state.scripts.find(s => s.id === id))
    .filter(Boolean).map(s => s.text).join(' ');

  if (!textsToAnalyze.trim()) return;

  const context = state.scripts
    .filter(s => s.status === 'analyzed')
    .slice(-2).map(s => s.text).join(' ');

  const analysisId = 'a_' + Date.now();
  const card = {
    id: analysisId,
    sourceIds: idsToAnalyze,
    sourceText: textsToAnalyze,
    priorContext: context,
    need: '분석 중...',
    risk: '분석 중...',
    explain: '분석 중...',
    loading: true,
    failed: false,
  };
  state.analyses.push(card);
  renderAnalyses();

  await runAnalysis(card);
}

async function runAnalysis(card) {
  card.loading = true;
  card.failed = false;
  card.need = '분석 중...';
  card.risk = '분석 중...';
  card.explain = '분석 중...';
  renderAnalyses();

  const maxRetries = 3;
  const delays = [2000, 5000, 10000]; // 2s, 5s, 10s

  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    try {
      const modelToUse = pickModel(attempt);
      const result = await callClaude(card.sourceText, card.priorContext, modelToUse);
      card.need = result.need || '(추출 실패)';
      card.risk = result.risk || '(추출 실패)';
      card.explain = result.explain || '(추출 실패)';
      card.loading = false;
      card.failed = false;

      card.sourceIds.forEach(id => {
        const s = state.scripts.find(x => x.id === id);
        if (s) s.status = 'analyzed';
      });
      renderScripts();
      renderAnalyses();
      markUnsaved();
      return;
    } catch (err) {
      const is529 = err.message.includes('529') || err.message.includes('overloaded');
      const is429 = err.message.includes('429');
      const shouldRetry = (is529 || is429) && attempt < maxRetries;

      if (shouldRetry) {
        if (is529) state.overloadCount++;
        setStatus(`재시도 ${attempt + 1}/${maxRetries} (${delays[attempt]/1000}초 대기)`, 'retry');
        await sleep(delays[attempt]);
      } else {
        card.loading = false;
        card.failed = true;
        card.need = '오류: ' + err.message.slice(0, 80);
        card.risk = '';
        card.explain = '재시도 버튼을 눌러주세요.';
        renderAnalyses();
        setStatus('분석 실패', 'error');
        return;
      }
    }
  }
}

function pickModel(attempt) {
  // 최근 overload가 3회 이상 발생했거나, 2번째 재시도 이후는 Haiku로 폴백
  if (state.overloadCount >= 3 || attempt >= 2) {
    state.currentModel = 'haiku';
    document.getElementById('curModel').textContent = 'Haiku (폴백)';
    return 'claude-haiku-4-5';
  }
  state.currentModel = 'sonnet';
  document.getElementById('curModel').textContent = 'Sonnet';
  return 'claude-sonnet-4-5';
}

async function callClaude(currentText, priorContext, model) {
  const apiKey = localStorage.getItem(API_KEY_STORAGE);
  if (!apiKey) throw new Error('API 키 미설정');

  const userMsg = priorContext
    ? `[직전 맥락]\n${priorContext}\n\n[분석 대상 구간]\n${currentText}`
    : `[분석 대상 구간]\n${currentText}`;

  const body = {
    model: model,
    max_tokens: 500,
    system: SYSTEM_PROMPT,
    messages: [{ role: 'user', content: userMsg }]
  };

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`API ${res.status}: ${errText.slice(0, 200)}`);
  }

  const data = await res.json();
  state.apiCalls++;
  state.inputTokens += data.usage?.input_tokens || 0;
  state.outputTokens += data.usage?.output_tokens || 0;
  updateBottomBar();

  const text = data.content?.[0]?.text || '';
  const cleaned = text.replace(/```json\s*|\s*```/g, '').trim();
  // JSON 내부에 있을 수 있으므로 첫 { 부터 마지막 } 까지 추출 시도
  const jsonMatch = cleaned.match(/\{[\s\S]*\}/);
  const jsonStr = jsonMatch ? jsonMatch[0] : cleaned;

  try {
    return JSON.parse(jsonStr);
  } catch {
    return { need: cleaned.slice(0, 200), risk: '', explain: '' };
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// 5분마다 overload 카운터 리셋
setInterval(() => {
  if (state.overloadCount > 0) state.overloadCount = Math.max(0, state.overloadCount - 1);
}, 60000);

// ══════════════════════════════════════════════════════
//  세션 저장·불러오기·삭제
// ══════════════════════════════════════════════════════
function getAllSessions() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch {
    return [];
  }
}

function saveAllSessions(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function saveCurrentSession() {
  if (state.scripts.length === 0) {
    toast('저장할 스크립트가 없습니다');
    return;
  }

  const name = document.getElementById('sessionName').value.trim();
  const now = new Date().toISOString();
  const list = getAllSessions();

  const sessionData = {
    id: state.currentSessionId || 'sess_' + Date.now(),
    name: name || null,
    createdAt: state.currentSessionId
      ? (list.find(s => s.id === state.currentSessionId)?.createdAt || now)
      : now,
    updatedAt: now,
    scripts: state.scripts,
    analyses: state.analyses.map(a => ({
      id: a.id, sourceIds: a.sourceIds, sourceText: a.sourceText,
      need: a.need, risk: a.risk, explain: a.explain,
      failed: a.failed, priorContext: a.priorContext
    })),
    stats: {
      apiCalls: state.apiCalls,
      inputTokens: state.inputTokens,
      outputTokens: state.outputTokens,
    }
  };

  // 기존이면 교체, 신규면 추가
  const existingIdx = list.findIndex(s => s.id === sessionData.id);
  if (existingIdx >= 0) list[existingIdx] = sessionData;
  else list.unshift(sessionData);

  saveAllSessions(list);
  state.currentSessionId = sessionData.id;
  markSaved();
  toast(name ? `"${name}" 저장됨` : '미분류로 저장됨');
}

function loadSession(sessionId) {
  const list = getAllSessions();
  const s = list.find(x => x.id === sessionId);
  if (!s) return;

  if (state.isRecording) stopRecording();

  state.scripts = s.scripts || [];
  state.analyses = (s.analyses || []).map(a => ({ ...a, loading: false }));
  state.currentSessionId = s.id;
  state.apiCalls = s.stats?.apiCalls || 0;
  state.inputTokens = s.stats?.inputTokens || 0;
  state.outputTokens = s.stats?.outputTokens || 0;
  state.pendingBuffer = [];

  document.getElementById('sessionName').value = s.name || '';

  renderScripts();
  renderAnalyses();
  updateBottomBar();
  updateBadges();
  markBrowsing();
  closeModal();
  toast(s.name ? `"${s.name}" 불러옴` : '미분류 세션 불러옴');
}

function deleteSession(sessionId) {
  const list = getAllSessions();
  const s = list.find(x => x.id === sessionId);
  const label = s?.name || '미분류';
  if (!confirm(`"${label}" 세션을 삭제할까요? 되돌릴 수 없습니다.`)) return;

  const newList = list.filter(x => x.id !== sessionId);
  saveAllSessions(newList);

  if (state.currentSessionId === sessionId) {
    state.currentSessionId = null;
    markUnsaved();
  }
  renderSessionList();
  toast('삭제됨');
}

// ══════════════════════════════════════════════════════
//  세션 목록 UI
// ══════════════════════════════════════════════════════
function openModal() {
  document.getElementById('modalList').classList.add('active');
  renderSessionList();
}
function closeModal() {
  document.getElementById('modalList').classList.remove('active');
}

function renderSessionList() {
  const list = getAllSessions();
  const body = document.getElementById('sessionListBody');

  if (list.length === 0) {
    body.innerHTML = '<div class="modal-empty">저장된 세션이 없습니다</div>';
    return;
  }

  // updatedAt 내림차순
  list.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

  body.innerHTML = list.map(s => {
    const nameHtml = s.name
      ? `<div class="name">${escapeHtml(s.name)}</div>`
      : `<div class="name unnamed">미분류 (이름 없음)</div>`;
    const dt = new Date(s.updatedAt);
    const dateStr = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    const scriptN = (s.scripts || []).length;
    const analysisN = (s.analyses || []).length;
    return `
      <div class="session-row">
        <div class="info">
          ${nameHtml}
          <div class="meta">
            <span>${dateStr}</span>
            <span>스크립트 ${scriptN}</span>
            <span>분석 ${analysisN}</span>
          </div>
        </div>
        <div class="btns">
          <button class="load" data-load="${s.id}">불러오기</button>
          <button class="del" data-del="${s.id}">삭제</button>
        </div>
      </div>
    `;
  }).join('');

  body.querySelectorAll('[data-load]').forEach(b =>
    b.addEventListener('click', () => loadSession(b.dataset.load)));
  body.querySelectorAll('[data-del]').forEach(b =>
    b.addEventListener('click', () => deleteSession(b.dataset.del)));
}

// ══════════════════════════════════════════════════════
//  전체 복사
// ══════════════════════════════════════════════════════
function copyFullScript() {
  if (state.scripts.length === 0) {
    toast('복사할 내용이 없습니다');
    return;
  }

  const name = document.getElementById('sessionName').value.trim() || '미분류';
  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  let out = `# 상담 세션: ${name}\n`;
  out += `일시: ${dateStr}\n`;
  out += `스크립트 ${state.scripts.length}문장 · 분석 ${state.analyses.length}건\n`;
  out += `\n────── 스크립트 ──────\n\n`;

  state.scripts.forEach(s => {
    const t = new Date(s.time);
    const tStr = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`;
    out += `[${tStr}] ${s.text}\n`;
  });

  if (state.analyses.length > 0) {
    out += `\n────── 분석 요약 ──────\n\n`;
    state.analyses.forEach((a, idx) => {
      out += `◆ 분석 ${idx + 1}\n`;
      out += `발화: "${a.sourceText}"\n`;
      out += `• 니즈·쟁점: ${a.need}\n`;
      out += `• 리스크: ${a.risk}\n`;
      out += `• 설명 포인트: ${a.explain}\n\n`;
    });
  }

  // 클립보드 API
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(out)
      .then(() => toast('전체 내용 복사됨 ✓'))
      .catch(err => {
        fallbackCopy(out);
      });
  } else {
    fallbackCopy(out);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    toast('복사됨 ✓');
  } catch {
    toast('복사 실패 - 수동 복사 필요');
  }
  document.body.removeChild(ta);
}

// ══════════════════════════════════════════════════════
//  렌더링
// ══════════════════════════════════════════════════════
function renderScripts() {
  const area = document.getElementById('scriptArea');
  if (state.scripts.length === 0) {
    // 초기 상태로 돌아갈 때는 빈 상태 유지
    return;
  }

  area.innerHTML = state.scripts.map(s => {
    const t = new Date(s.time);
    const tStr = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`;
    return `
      <div class="script-item ${s.status}">
        <div class="time">${tStr}</div>
        <div>${escapeHtml(s.text)}</div>
      </div>
    `;
  }).join('') + '<div id="interimHolder"></div>';

  area.scrollTop = area.scrollHeight;
  updateBadges();
}

function renderInterim(text) {
  const holder = document.getElementById('interimHolder');
  if (!holder) return;
  if (text.trim()) {
    holder.innerHTML = `<div class="script-item pending"><div class="time">…인식 중</div><div>${escapeHtml(text)}</div></div>`;
  } else {
    holder.innerHTML = '';
  }
}

function renderAnalyses() {
  const area = document.getElementById('analysisArea');
  if (state.analyses.length === 0) return;

  area.innerHTML = state.analyses.slice().reverse().map(a => `
    <div class="analysis-card ${a.loading ? 'loading' : ''} ${a.failed ? 'failed' : ''}">
      <div class="source-text">"${escapeHtml(a.sourceText)}"</div>
      <div class="analysis-section">
        <div class="label label-need"><span class="icon"></span>고객 니즈·쟁점</div>
        <div class="content">${escapeHtml(a.need)}</div>
      </div>
      <div class="analysis-section">
        <div class="label label-risk"><span class="icon"></span>리스크</div>
        <div class="content">${escapeHtml(a.risk)}</div>
      </div>
      <div class="analysis-section">
        <div class="label label-explain"><span class="icon"></span>설명 포인트</div>
        <div class="content">${escapeHtml(a.explain)}</div>
      </div>
      ${a.failed ? `<button class="retry-btn" data-retry="${a.id}">🔄 재시도</button>` : ''}
    </div>
  `).join('');

  area.querySelectorAll('[data-retry]').forEach(b =>
    b.addEventListener('click', () => {
      const card = state.analyses.find(x => x.id === b.dataset.retry);
      if (card) runAnalysis(card);
    }));

  updateBadges();
}

function updateBadges() {
  document.getElementById('scriptCountBadge').textContent = state.scripts.length;
  document.getElementById('analysisCountBadge').textContent = state.analyses.length;
  document.getElementById('scriptCount').textContent = state.scripts.length;
}

function updateBottomBar() {
  document.getElementById('apiCalls').textContent = state.apiCalls;
  document.getElementById('inputTokens').textContent = state.inputTokens.toLocaleString();
  document.getElementById('outputTokens').textContent = state.outputTokens.toLocaleString();
  // Sonnet 4.5: 입력 $3 / 출력 $15 per MTok
  // Haiku 4.5: 입력 $1 / 출력 $5 per MTok
  // 혼합 사용이지만 단순화 위해 Sonnet 단가로 표시
  const cost = (state.inputTokens * 3 + state.outputTokens * 15) / 1_000_000;
  document.getElementById('estCost').textContent = '$' + cost.toFixed(4);
}

function escapeHtml(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function setStatus(text, cls = '') {
  const el = document.getElementById('status');
  el.className = 'status ' + cls;
  document.getElementById('statusText').textContent = text;
}

function updateSessionTime() {
  if (!state.sessionStart) return;
  const sec = Math.floor((Date.now() - state.sessionStart) / 1000);
  const mm = String(Math.floor(sec / 60)).padStart(2, '0');
  const ss = String(sec % 60).padStart(2, '0');
  document.getElementById('sessionTime').textContent = `${mm}:${ss}`;
}

function markUnsaved() {
  const el = document.getElementById('sessionStatus');
  el.className = 'status-tag unsaved';
  el.textContent = '저장 전';
}
function markSaved() {
  const el = document.getElementById('sessionStatus');
  el.className = 'status-tag saved';
  el.textContent = '저장됨';
}
function markBrowsing() {
  const el = document.getElementById('sessionStatus');
  el.className = 'status-tag browsing';
  el.textContent = '불러옴';
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════════════════
//  새 세션 시작
// ══════════════════════════════════════════════════════
function startNewSession() {
  if (state.scripts.length > 0) {
    const status = document.getElementById('sessionStatus').textContent;
    if (status === '저장 전') {
      if (!confirm('현재 세션이 저장되지 않았습니다. 버리고 새 상담을 시작할까요?')) return;
    } else {
      if (!confirm('새 상담을 시작할까요?')) return;
    }
  }

  if (state.isRecording) stopRecording();

  state.scripts = [];
  state.analyses = [];
  state.pendingBuffer = [];
  state.currentSessionId = null;
  state.apiCalls = 0;
  state.inputTokens = 0;
  state.outputTokens = 0;
  state.overloadCount = 0;
  state.currentModel = 'sonnet';

  document.getElementById('sessionName').value = '';
  document.getElementById('scriptArea').innerHTML = getInitialScriptHtml();
  document.getElementById('analysisArea').innerHTML = getInitialAnalysisHtml();
  document.getElementById('sessionTime').textContent = '00:00';
  document.getElementById('curModel').textContent = 'Sonnet';

  markUnsaved();
  updateBadges();
  updateBottomBar();
  setStatus('대기');
}

function getInitialScriptHtml() {
  return `<div class="empty-state">
    "🎤 녹음" 버튼을 눌러 대화를 시작하세요.<br>
    마이크 권한을 허용해주세요.<br><br>
    <strong>v2 동작 규칙</strong><br>
    말과 말 사이 <strong>3초 이상 침묵</strong>이 감지되면<br>
    그때까지의 문장을 한 덩어리로 분석합니다.
  </div>`;
}
function getInitialAnalysisHtml() {
  return `<div class="empty-state">
    3초 침묵이 감지되면<br>
    <strong style="color:var(--need)">니즈·쟁점</strong>,
    <strong style="color:var(--risk)">리스크</strong>,
    <strong style="color:var(--explain)">설명 포인트</strong>가<br>

}

// ══════════════════════════════════════════════════════
//  녹음 시작/정지
// ══════════════════════════════════════════════════════
function startRecording() {
  if (!state.recognition) state.recognition = initRecognition();
  if (!state.recognition) return;

  try {
    state.recognition.start();
    state.isRecording = true;
    if (!state.sessionStart) state.sessionStart = Date.now();
    state.sessionTimer = setInterval(updateSessionTime, 1000);
    document.getElementById('btnRecord').textContent = '⏹ 정지';
    document.getElementById('btnRecord').classList.add('recording');
    setStatus('녹음 중', 'active');

    // 첫 녹음이면 초기 화면 제거
    if (state.scripts.length === 0) {
      document.getElementById('scriptArea').innerHTML = '<div id="interimHolder"></div>';
      document.getElementById('analysisArea').innerHTML = '';
    }
  } catch (e) {
    setStatus('시작 실패: ' + e.message, 'error');
  }
}

function stopRecording() {
  state.isRecording = false;
  if (state.recognition) {
    try { state.recognition.stop(); } catch(e) {}
  }
  if (state.sessionTimer) { clearInterval(state.sessionTimer); state.sessionTimer = null; }
  if (state.silenceTimer) { clearTimeout(state.silenceTimer); state.silenceTimer = null; }

  // 잔여 버퍼 마지막 분석
  if (state.pendingBuffer.length > 0) triggerAnalysis();

  document.getElementById('btnRecord').textContent = '🎤 녹음';
  document.getElementById('btnRecord').classList.remove('recording');
  setStatus('정지');
}

// ══════════════════════════════════════════════════════
//  이벤트 바인딩
// ══════════════════════════════════════════════════════
const savedKey = localStorage.getItem(API_KEY_STORAGE);
if (savedKey) document.getElementById('apiKey').value = savedKey;

document.getElementById('saveKey').addEventListener('click', () => {
  const v = document.getElementById('apiKey').value.trim();
  if (!v.startsWith('sk-ant-')) {
    alert('유효한 Anthropic API 키 형식이 아닙니다 (sk-ant-로 시작).');
    return;
  }
  localStorage.setItem(API_KEY_STORAGE, v);
  toast('API 키 저장됨');
});

document.getElementById('btnRecord').addEventListener('click', () => {
  if (!localStorage.getItem(API_KEY_STORAGE)) {
    alert('먼저 Anthropic API 키를 입력하고 "키 저장"을 눌러주세요.');
    return;
  }
  if (!state.isRecording) startRecording();
  else stopRecording();
});

document.getElementById('btnSave').addEventListener('click', saveCurrentSession);
document.getElementById('btnCopy').addEventListener('click', copyFullScript);
document.getElementById('btnList').addEventListener('click', openModal);
document.getElementById('btnNew').addEventListener('click', startNewSession);
document.getElementById('closeList').addEventListener('click', closeModal);
document.getElementById('modalList').addEventListener('click', (e) => {
  if (e.target.id === 'modalList') closeModal();
});
document.getElementById('sessionName').addEventListener('input', markUnsaved);

// 초기 화면
setStatus('대기');
document.getElementById('scriptArea').innerHTML = getInitialScriptHtml();
document.getElementById('analysisArea').innerHTML = getInitialAnalysisHtml();
</script>

</body>
</html>

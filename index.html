<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>실시간 상담 비서 프로토타입</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1419;
    --panel: #1a1f2e;
    --panel-2: #222938;
    --border: #2d3548;
    --text: #e4e6eb;
    --text-dim: #8b95a8;
    --accent: #6ba4ff;
    --accent-2: #4a7fd1;
    --need: #5eead4;
    --risk: #f87171;
    --explain: #fbbf24;
    --success: #4ade80;
    --danger: #ef4444;
  }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; flex-direction: column; height: 100vh; }

  /* ────── 상단 바 ────── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .topbar .title {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
  }
  .topbar .sep { flex: 1; }
  .topbar button, .topbar input {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .topbar input[type="password"] { width: 180px; }
  .topbar button:hover { border-color: var(--accent); }
  .btn-record {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    border: 0;
  }
  .btn-record.recording {
    background: var(--danger);
    animation: pulse 1.5s infinite;
  }
  .btn-record:disabled { opacity: 0.4; cursor: not-allowed; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .status {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-dim);
  }
  .status.active .dot { background: var(--success); }
  .status.error .dot { background: var(--danger); }

  /* ────── 메인 레이아웃 ────── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  .pane-left, .pane-right {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  .pane-left {
    flex: 0 0 58%;
    border-right: 1px solid var(--border);
    background: var(--bg);
  }
  .pane-right {
    flex: 0 0 42%;
    background: #12161f;
  }
  .pane-header {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* ────── 스크립트 영역 ────── */
  .script-item {
    background: var(--panel);
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 15px;
    line-height: 1.6;
    border-left: 3px solid var(--border);
    transition: all 0.3s;
  }
  .script-item.pending {
    border-left-color: var(--accent-2);
    opacity: 0.7;
    font-style: italic;
  }
  .script-item.analyzed {
    border-left-color: var(--accent);
  }
  .script-item .time {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  /* ────── 분석 카드 ────── */
  .analysis-card {
    background: var(--panel);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }
  .analysis-card .source-text {
    font-size: 12px;
    color: var(--text-dim);
    padding: 8px 10px;
    background: var(--bg);
    border-radius: 6px;
    margin-bottom: 10px;
    border-left: 2px solid var(--accent-2);
    max-height: 60px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .analysis-section {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
  }
  .analysis-section:first-child {
    margin-top: 0;
    padding-top: 0;
    border-top: 0;
  }
  .analysis-section .label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .analysis-section .label .icon {
    width: 14px; height: 14px;
    border-radius: 3px;
    display: inline-block;
  }
  .label-need .icon { background: var(--need); }
  .label-risk .icon { background: var(--risk); }
  .label-explain .icon { background: var(--explain); }
  .label-need { color: var(--need); }
  .label-risk { color: var(--risk); }
  .label-explain { color: var(--explain); }
  .analysis-section .content {
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
  }
  .analysis-card.loading .content { color: var(--text-dim); font-style: italic; }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.7;
  }

  /* ────── 하단 바 ────── */
  .bottombar {
    padding: 8px 16px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .bottombar span strong { color: var(--text); }

  /* 아이패드 세로 대응 */
  @media (max-width: 900px) {
    .pane-left { flex: 0 0 55%; }
    .pane-right { flex: 0 0 45%; }
    .topbar input[type="password"] { width: 130px; }
  }
  /* 아이폰 세로 (세로 스택으로 전환) */
  @media (max-width: 600px) {
    .main { flex-direction: column; }
    .pane-left, .pane-right { flex: 1 1 50%; border-right: 0; }
    .pane-left { border-bottom: 1px solid var(--border); }
  }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="title">🎙️ 실시간 상담 비서</div>
  <div class="status" id="status">
    <span class="dot"></span>
    <span id="statusText">대기</span>
  </div>
  <div class="sep"></div>
  <input type="password" id="apiKey" placeholder="Anthropic API 키" autocomplete="off">
  <button id="saveKey">키 저장</button>
  <button id="btnRecord" class="btn-record">🎤 녹음 시작</button>
  <button id="btnClear">초기화</button>
</div>

<div class="main">
  <div class="pane-left">
    <div class="pane-header">📝 실시간 스크립트</div>
    <div id="scriptArea">
      <div class="empty-state">
        상단 "녹음 시작" 버튼을 눌러 대화를 시작하세요.<br>
        브라우저가 마이크 권한을 요청하면 허용해주세요.<br><br>
        iOS Safari에서는 화면이 꺼지면 녹음이 중단됩니다.
      </div>
    </div>
  </div>
  <div class="pane-right">
    <div class="pane-header">🔍 실시간 분석</div>
    <div id="analysisArea">
      <div class="empty-state">
        대화가 진행되면 문단 단위로<br>
        <strong style="color:var(--need)">고객 니즈·쟁점</strong>,
        <strong style="color:var(--risk)">리스크</strong>,
        <strong style="color:var(--explain)">설명 포인트</strong>가<br>
        이곳에 표시됩니다.
      </div>
    </div>
  </div>
</div>

<div class="bottombar">
  <span>세션 시간: <strong id="sessionTime">00:00</strong></span>
  <span>스크립트: <strong id="scriptCount">0</strong>문장</span>
  <span>분석 호출: <strong id="apiCalls">0</strong>회</span>
  <span>입력 토큰: <strong id="inputTokens">0</strong></span>
  <span>출력 토큰: <strong id="outputTokens">0</strong></span>
  <span>예상 비용: <strong id="estCost">$0.0000</strong></span>
</div>

<script>
// ══════════════════════════════════════════════
//  1. 상태 관리
// ══════════════════════════════════════════════
const state = {
  recognition: null,
  isRecording: false,
  scripts: [],          // { id, text, time, status: 'pending'|'analyzed' }
  analyses: [],         // { id, sourceIds, need, risk, explain }
  pendingBuffer: [],    // 아직 분석 안 된 스크립트 id들
  lastSpeechTime: 0,
  silenceTimer: null,
  sessionStart: null,
  sessionTimer: null,
  apiCalls: 0,
  inputTokens: 0,
  outputTokens: 0,
};

// ══════════════════════════════════════════════
//  2. 상담실장 스킬 기반 시스템 프롬프트
// ══════════════════════════════════════════════
const SYSTEM_PROMPT = `당신은 18년 경력 세무사의 실시간 상담 보조 AI입니다.
세무사와 고객(사업자·법인 대표)의 대화 일부를 받으면, 세무사가 상담 중에 즉시 참고할 수 있도록 아래 세 가지를 간결하게 추출합니다.

## 출력 형식 (반드시 JSON)
{
  "need": "고객의 니즈·쟁점을 1~2문장으로. 표면 질문이 아니라 진짜 원하는 것을 추론.",
  "risk": "세무·법적 리스크를 1~2문장으로. 없으면 '현재 구간에서 식별된 리스크 없음'.",
  "explain": "세무사가 지금 상대방에게 설명해야 할 핵심 포인트를 1~2문장으로. 법령 근거가 있으면 조문 표기."
}

## 작성 원칙
- 각 항목은 실제 상담 중 3초 안에 눈으로 훑을 수 있게 짧고 구체적으로
- 한국 세법(국세기본법·법인세법·소득세법·부가세법·상증세법) 맥락 우선
- 추측을 단언하지 말 것. 불확실하면 "확인 필요:" 접두사 사용
- 실명·주민번호·구체 금액이 스크립트에 포함되어 있어도 출력에는 일반화해서 작성
- JSON 외의 설명·서문·후기 절대 금지

## 예시 입력
"대표님: 작년에 직원 2명 뽑았는데, 4대보험 때문에 부담이 커서 프리랜서로 계약하려고요."

## 예시 출력
{"need":"인건비 부담 완화 — 고용 유지는 필요하지만 사회보험료 부담을 줄이고 싶음.","risk":"실질 근로자를 프리랜서(3.3%)로 위장 계약 시 근로기준법·세법상 근로자성 판정으로 추징 및 과태료 가능. 국세청 사업장 지도점검 대상.","explain":"형식 계약이 아니라 지휘·감독 실질이 판정 기준임을 고지. 업무 독립성 확보(업무 시간·장소 자율, 복수 거래처)가 가능한 직무만 한정 검토 권고."}`;

// ══════════════════════════════════════════════
//  3. Web Speech API 초기화
// ══════════════════════════════════════════════
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    setStatus('음성 인식 미지원 브라우저', 'error');
    alert('Safari 또는 Chrome에서 실행해주세요.');
    return null;
  }
  const rec = new SR();
  rec.lang = 'ko-KR';
  rec.continuous = true;
  rec.interimResults = true;

  let interimBuffer = '';

  rec.onresult = (event) => {
    let interim = '';
    let finalText = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalText += t;
      else interim += t;
    }

    if (finalText.trim()) {
      addScript(finalText.trim());
      state.lastSpeechTime = Date.now();
      resetSilenceTimer();
    }

    // 화면 하단에 임시 인식 결과 표시 (선택)
    interimBuffer = interim;
    renderInterim(interim);
  };

  rec.onerror = (e) => {
    console.error('Recognition error:', e.error);
    if (e.error === 'no-speech') return;  // 무음은 무시
    setStatus(`오류: ${e.error}`, 'error');
  };

  rec.onend = () => {
    // continuous 모드에서도 iOS는 자주 끊김 → 자동 재시작
    if (state.isRecording) {
      try { rec.start(); } catch(e) { console.warn('재시작 실패', e); }
    }
  };

  return rec;
}

// ══════════════════════════════════════════════
//  4. 스크립트 / 분석 관리
// ══════════════════════════════════════════════
function addScript(text) {
  const id = Date.now() + '_' + Math.random().toString(36).slice(2, 7);
  const item = { id, text, time: new Date(), status: 'pending' };
  state.scripts.push(item);
  state.pendingBuffer.push(id);
  renderScripts();

  // 문장이 2개 이상 쌓이면 즉시 분석 트리거
  if (state.pendingBuffer.length >= 2) {
    triggerAnalysis();
  }
}

function resetSilenceTimer() {
  if (state.silenceTimer) clearTimeout(state.silenceTimer);
  // 3초 침묵 시 분석 트리거
  state.silenceTimer = setTimeout(() => {
    if (state.pendingBuffer.length > 0) triggerAnalysis();
  }, 3000);
}

async function triggerAnalysis() {
  const idsToAnalyze = [...state.pendingBuffer];
  if (idsToAnalyze.length === 0) return;
  state.pendingBuffer = [];

  const textsToAnalyze = idsToAnalyze
    .map(id => state.scripts.find(s => s.id === id))
    .filter(Boolean)
    .map(s => s.text)
    .join(' ');

  if (!textsToAnalyze.trim()) return;

  // 직전 맥락 2개 포함 (이미 분석된 것)
  const context = state.scripts
    .filter(s => s.status === 'analyzed')
    .slice(-2)
    .map(s => s.text)
    .join(' ');

  const analysisId = 'a_' + Date.now();
  const card = {
    id: analysisId,
    sourceIds: idsToAnalyze,
    sourceText: textsToAnalyze,
    need: '분석 중...',
    risk: '분석 중...',
    explain: '분석 중...',
    loading: true
  };
  state.analyses.push(card);
  renderAnalyses();

  try {
    const result = await callClaude(textsToAnalyze, context);
    card.need = result.need || '(추출 실패)';
    card.risk = result.risk || '(추출 실패)';
    card.explain = result.explain || '(추출 실패)';
    card.loading = false;

    // 해당 스크립트 analyzed 표시
    idsToAnalyze.forEach(id => {
      const s = state.scripts.find(x => x.id === id);
      if (s) s.status = 'analyzed';
    });
    renderScripts();
    renderAnalyses();
  } catch (err) {
    console.error(err);
    card.need = '오류: ' + err.message;
    card.risk = '';
    card.explain = '';
    card.loading = false;
    renderAnalyses();
    setStatus('분석 오류: ' + err.message, 'error');
  }
}

// ══════════════════════════════════════════════
//  5. Claude API 호출
// ══════════════════════════════════════════════
async function callClaude(currentText, priorContext) {
  const apiKey = localStorage.getItem('anthropic_api_key');
  if (!apiKey) throw new Error('API 키 미설정');

  const userMsg = priorContext
    ? `[직전 맥락]\n${priorContext}\n\n[분석 대상 구간]\n${currentText}`
    : `[분석 대상 구간]\n${currentText}`;

  const body = {
    model: 'claude-sonnet-4-5',
    max_tokens: 500,
    system: SYSTEM_PROMPT,
    messages: [{ role: 'user', content: userMsg }]
  };

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`API ${res.status}: ${errText.slice(0, 100)}`);
  }

  const data = await res.json();
  state.apiCalls++;
  state.inputTokens += data.usage?.input_tokens || 0;
  state.outputTokens += data.usage?.output_tokens || 0;
  updateBottomBar();

  const text = data.content?.[0]?.text || '';
  // JSON 파싱 (모델이 ```json 감쌀 가능성 대비)
  const cleaned = text.replace(/```json\s*|\s*```/g, '').trim();
  try {
    return JSON.parse(cleaned);
  } catch {
    // JSON 아니면 raw 리턴
    return { need: cleaned, risk: '', explain: '' };
  }
}

// ══════════════════════════════════════════════
//  6. 렌더링
// ══════════════════════════════════════════════
function renderScripts() {
  const area = document.getElementById('scriptArea');
  if (state.scripts.length === 0) return;

  area.innerHTML = state.scripts.map(s => `
    <div class="script-item ${s.status}">
      <div class="time">${formatTime(s.time)}</div>
      <div>${escapeHtml(s.text)}</div>
    </div>
  `).join('') + '<div id="interimHolder"></div>';

  // 자동 스크롤
  area.scrollTop = area.scrollHeight;
  document.getElementById('scriptCount').textContent = state.scripts.length;
}

function renderInterim(text) {
  const holder = document.getElementById('interimHolder');
  if (!holder) return;
  if (text.trim()) {
    holder.innerHTML = `<div class="script-item pending"><div class="time">…인식 중</div><div>${escapeHtml(text)}</div></div>`;
  } else {
    holder.innerHTML = '';
  }
}

function renderAnalyses() {
  const area = document.getElementById('analysisArea');
  if (state.analyses.length === 0) return;

  area.innerHTML = state.analyses.slice().reverse().map(a => `
    <div class="analysis-card ${a.loading ? 'loading' : ''}">
      <div class="source-text">"${escapeHtml(a.sourceText)}"</div>
      <div class="analysis-section">
        <div class="label label-need"><span class="icon"></span>고객 니즈·쟁점</div>
        <div class="content">${escapeHtml(a.need)}</div>
      </div>
      <div class="analysis-section">
        <div class="label label-risk"><span class="icon"></span>리스크</div>
        <div class="content">${escapeHtml(a.risk)}</div>
      </div>
      <div class="analysis-section">
        <div class="label label-explain"><span class="icon"></span>설명 포인트</div>
        <div class="content">${escapeHtml(a.explain)}</div>
      </div>
    </div>
  `).join('');
}

function updateBottomBar() {
  document.getElementById('apiCalls').textContent = state.apiCalls;
  document.getElementById('inputTokens').textContent = state.inputTokens.toLocaleString();
  document.getElementById('outputTokens').textContent = state.outputTokens.toLocaleString();
  // Sonnet 4.5 단가: 입력 $3/MTok, 출력 $15/MTok
  const cost = (state.inputTokens * 3 + state.outputTokens * 15) / 1_000_000;
  document.getElementById('estCost').textContent = '$' + cost.toFixed(4);
}

// ══════════════════════════════════════════════
//  7. 유틸리티
// ══════════════════════════════════════════════
function formatTime(d) {
  return d.toTimeString().slice(0, 8);
}
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}
function setStatus(text, cls = '') {
  const el = document.getElementById('status');
  el.className = 'status ' + cls;
  document.getElementById('statusText').textContent = text;
}
function updateSessionTime() {
  if (!state.sessionStart) return;
  const sec = Math.floor((Date.now() - state.sessionStart) / 1000);
  const mm = String(Math.floor(sec / 60)).padStart(2, '0');
  const ss = String(sec % 60).padStart(2, '0');
  document.getElementById('sessionTime').textContent = `${mm}:${ss}`;
}

// ══════════════════════════════════════════════
//  8. 이벤트 바인딩
// ══════════════════════════════════════════════
// API 키 저장/복원
const savedKey = localStorage.getItem('anthropic_api_key');
if (savedKey) document.getElementById('apiKey').value = savedKey;

document.getElementById('saveKey').addEventListener('click', () => {
  const v = document.getElementById('apiKey').value.trim();
  if (!v.startsWith('sk-ant-')) {
    alert('유효한 Anthropic API 키 형식이 아닙니다 (sk-ant-로 시작).');
    return;
  }
  localStorage.setItem('anthropic_api_key', v);
  setStatus('API 키 저장됨', 'active');
  setTimeout(() => setStatus(state.isRecording ? '녹음 중' : '대기'), 2000);
});

document.getElementById('btnRecord').addEventListener('click', () => {
  if (!localStorage.getItem('anthropic_api_key')) {
    alert('먼저 Anthropic API 키를 입력하고 "키 저장"을 눌러주세요.');
    return;
  }
  if (!state.isRecording) {
    startRecording();
  } else {
    stopRecording();
  }
});

document.getElementById('btnClear').addEventListener('click', () => {
  if (state.isRecording) stopRecording();
  if (!confirm('모든 스크립트와 분석 기록을 지울까요?')) return;
  state.scripts = [];
  state.analyses = [];
  state.pendingBuffer = [];
  state.apiCalls = 0;
  state.inputTokens = 0;
  state.outputTokens = 0;
  document.getElementById('scriptArea').innerHTML = '<div class="empty-state">초기화되었습니다. 녹음을 다시 시작하세요.</div>';
  document.getElementById('analysisArea').innerHTML = '<div class="empty-state">분석 대기 중</div>';
  updateBottomBar();
  document.getElementById('scriptCount').textContent = '0';
  document.getElementById('sessionTime').textContent = '00:00';
});

function startRecording() {
  if (!state.recognition) state.recognition = initRecognition();
  if (!state.recognition) return;

  try {
    state.recognition.start();
    state.isRecording = true;
    state.sessionStart = Date.now();
    state.sessionTimer = setInterval(updateSessionTime, 1000);
    document.getElementById('btnRecord').textContent = '⏹ 녹음 정지';
    document.getElementById('btnRecord').classList.add('recording');
    setStatus('녹음 중', 'active');

    // 초기화
    document.getElementById('scriptArea').innerHTML = '<div id="interimHolder"></div>';
    document.getElementById('analysisArea').innerHTML = '';
  } catch (e) {
    setStatus('시작 실패: ' + e.message, 'error');
  }
}

function stopRecording() {
  state.isRecording = false;
  if (state.recognition) {
    try { state.recognition.stop(); } catch(e) {}
  }
  if (state.sessionTimer) clearInterval(state.sessionTimer);
  if (state.silenceTimer) clearTimeout(state.silenceTimer);

  // 잔여 버퍼 마지막 분석
  if (state.pendingBuffer.length > 0) triggerAnalysis();

  document.getElementById('btnRecord').textContent = '🎤 녹음 시작';
  document.getElementById('btnRecord').classList.remove('recording');
  setStatus('정지', '');
}

// 초기 상태
setStatus('대기');
</script>
